<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Agrisense</title>
  <style>
    * { margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    .loading { 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      height: 100vh;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { color: white; margin-top: 20px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div class="text">Chargement...</div>
  </div>

  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator && 'caches' in window) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(reg => {
        console.log('Service Worker registered');
      }).catch(err => console.log('SW failed:', err));
    }

    // Check connection and redirect
    function loadApp() {
      if (navigator.onLine) {
        // Load from online source
        window.location.href = 'https://agrisense-madagascar.vercel.app/';
      } else {
        // Try to show cached version or offline page
        fetch('/', { cache: 'force-cache' })
          .then(r => r.ok ? r.text() : showOffline())
          .then(html => {
            if (html) {
              document.open();
              document.write(html);
              document.close();
            }
          })
          .catch(() => showOffline());
      }
    }

    function showOffline() {
      document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#10b981,#059669);color:white;text-align:center;">
          <div style="font-size:3em;margin-bottom:1rem;">📶</div>
          <h1>Hors ligne</h1>
          <p>Veuillez vous connecter à Internet</p>
          <button onclick="location.reload()" style="margin-top:2rem;padding:1rem;background:white;color:#10b981;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">Réessayer</button>
        </div>
      `;
    }

    // Wait for device ready (Capacitor)
    if (window.cordova) {
      document.addEventListener('deviceready', loadApp);
    } else {
      window.addEventListener('load', loadApp);
    }

    // Listen for online/offline changes
    window.addEventListener('online', () => {
      console.log('Back online');
      location.reload();
    });
  </script>
</body>
</html>
