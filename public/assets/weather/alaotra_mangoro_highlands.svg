<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad_highlands" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8e9eab;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#eef2f3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="1920" height="1080" fill="url(#grad_highlands)" />
    <!-- Dynamic overlay for glassmorphism effect -->
    <circle cx="1500" cy="200" r="400" fill="#ffffff" opacity="0.1" />
    <circle cx="300" cy="900" r="600" fill="#000000" opacity="0.1" />
    
    <text x="50%" y="45%" font-family="system-ui, sans-serif" font-size="200" font-weight="900" fill="#ffffff" opacity="0.3" text-anchor="middle" dominant-baseline="middle">
        Alaotra Mangoro
    </text>
    <text x="50%" y="65%" font-family="system-ui, sans-serif" font-size="150" fill="#ffffff" opacity="0.5" text-anchor="middle" dominant-baseline="middle">
        ☁️ HIGHLANDS
    </text>
